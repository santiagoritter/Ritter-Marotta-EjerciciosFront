<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Santiago Ritter</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>

<header class="encabezado">
    <div class="fila-cabecera">
        <a href="index.html" class="marca">Santiago Ritter</a>
        <nav class="menu" id="navLinks">
            <ul class="lista-menu">
                <li><a href="index.html#servicios" class="enlace-menu">Servicios</a></li>
                <li><a href="index.html#trabajos" class="enlace-menu">Trabajos</a></li>
                <li><a href="index.html#sobre-mi" class="enlace-menu">Sobre mi</a></li>
                <li><a href="contacto.html" class="enlace-menu">Contacto</a></li>
            </ul>
        </nav>
        <button class="boton-hamburguesa" id="toggleMenu"></button>
    </div>
</header>

<section class="bloque">
    <div class="contenedor">
<div class="parte-superior-contacto">
            <h1>Manda un mensaje.</h1>
            <p class="descripcion-contacto">Si tenes un proyecto o una idea, escribime. No hace falta tener todo claro para hablar.</p>
            <p class="correo-contacto">santiago@correo.com</p>
        </div>

        <form id="formulario" class="formulario">
            <div class="fila-campo">
                <label for="nombre" class="etiqueta-campo">Tu nombre</label>
                <input type="text" id="nombre" name="nombre" class="campo-texto" placeholder="Matias Faya" required>
            </div>
            <div class="fila-campo">
                <label for="email" class="etiqueta-campo">Tu email</label>
                <input type="email" id="email" name="email" class="campo-texto" required>
            </div>
            <div class="fila-campo">
                <label for="mensaje" class="etiqueta-campo">Contame</label>
                <input type="text" id="mensaje" name="mensaje" class="campo-texto" placeholder="Hola, necesito..." required>
            </div>
            <button type="submit" class="boton-lleno">Mandar</button>
        </form>
    </div>
</section>

<footer class="pie">
    <div class="fila-pie">
        <p class="marca">Santiago Ritter</p>
        <p class="texto-pie">&copy; 2026 Santiago Ritter</p>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
